<!DOCTYPE html>
<!-- Ok.. so for the search bar.. they need to be able to type CHARACTERS or BACKSPACE -->
<!-- And no matter what, it will type "hunter" and suggest @hunter (me) -->
<meta charset="utf-8"/>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style>
			.background {
				margin:0;
				padding:0;
				background-color:#fafafa;
				overflow-y:scroll;
			}
			.top-nav {
				border-bottom: 1px solid lightgrey;
				background-color:#ffffff;
				-webkit-user-select: none;  /* Chrome all / Safari all */
				-moz-user-select: none;     /* Firefox all */
				-ms-user-select: none;      /* IE 10+ */
				user-select: none;
				margin:auto;

			}
			.nav-inner-container {
				align-items:center;
				display:flex;
				justify-content: space-between;
				flex-direction:row;
				max-width:975px;
				margin:auto;

			}
			.huntergram-logo-container {
				display:flex;
				margin-top:5px;
				margin-bottom:9px;
				position:relative;
				width:215px;
			}
			.huntergram-logo {
				object-fit:contain;
				margin-top:6px;
				height:34px;
				padding-left:20px;
			}

			.searchbox {
				cursor: text;
				display:flex;
				flex-direction: column;

				position: relative;
				align-items:center;
				height:28px;
				width:215px;
				min-width:100px;
				border:solid 1px lightgrey;
				border-radius:3px;
				background-color:#fafafa;
				font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
				line-height:18px;
				font-size: 14px;
				font-weight: 300;
				overflow-x: auto;
				overflow-y: auto;
				margin-left:20px;
				margin-right:20px;
			}

			@media (max-width: 460px) {
   			.searchbox {
      		display: none;
   			}
			}

			.search-inner-container {
				margin:auto;
			}
			.spyglass {
				display:inline-block;
				margin-right:3px;
				margin-left:-12px;
				vertical-align:baseline;
				height:10px;
				width:10px;
			}
			.the-word-search {
				display: inline-block;
				max-width: 140px;
				overflow: hidden;
				text-overflow: ellipsis;
				vertical-align: bottom;
				white-space: nowrap;
				color: #a5a5a5;
			}
			.buttons {
				width:215px;
				display:flex;
				justify-content: flex-end;
				flex-direction:row;
				padding-right:20px;
			}
		</style>
	</head>

	<body class="background">
		<nav class="top-nav">
			<div class="nav-inner-container">

				<div class="huntergram-logo-container">
					<img class="huntergram-logo" src="huntergram_logo.svg">
				</div>

				<div class="searchbox">
					<div class="search-inner-container">
						<span><img class="spyglass" src="spyglass.png"></span>
						<span class = "the-word-search">Search</span>
					</div>
				</div>

				<div class="buttons">
					<img fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="home.svg">
					<img style="margin-left: 22px;" fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="compass.svg">
					<img style="margin-left: 22px;" fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="heart.svg"">
				</div>

			</div>
		</nav >
	</body>
</html>
