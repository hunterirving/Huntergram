<!DOCTYPE html>
<!-- Ok.. so for the search bar.. they need to be able to type CHARACTERS or BACKSPACE -->
<!-- And no matter what, it will type "hunter" and suggest @hunter (me) -->
<meta charset="utf-8"/>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style>
			.background {
				margin:0px;
				background-color:#fafafa;
				overflow-y:scroll;
			}
			.top-nav {
				border-bottom: 1px solid lightgrey;
				background-color:#ffffff;
				-webkit-user-select: none;  /* Chrome all / Safari all */
				-moz-user-select: none;     /* Firefox all */
				-ms-user-select: none;      /* IE 10+ */
				user-select: none;
				margin:auto;
				top: 0;
				width:100%;
				position: fixed; /* sticky top nav? */
				z-index:1;
			}
			.nav-inner-container {
				align-items:center;
				display:flex;
				justify-content: space-between;
				flex-direction:row;
				max-width:975px;
				margin:auto;
				padding-bottom:90;
			}
			.huntergram-logo-container {
				margin-top:12px;
				margin-bottom:4px;
				margin-left:13px;
			}
			.huntergram-logo {
				height:34px;
				width:148px;
			}

			.searchbox {
				cursor: text;
				display:flex;
				flex-direction: column;
				position: relative;
				align-items:center;
				height:26px;
				width:215px;
				min-width:100px;
				border:solid 1px lightgrey;
				border-radius:3px;
				background-color:#fafafa;
				font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
				line-height:18px;
				font-size: 14px;
				font-weight: 300;
				overflow-x: auto;
				overflow-y: auto;
				margin-left:14px;
				margin-right:30px;
			}
			@media (max-width: 460px) {
   			.searchbox {
      		display: none;
   			}
			}

			.search-inner-container {
				margin:auto;
			}
			.spyglass {
				display:inline-block;
				margin-right:3px;
				margin-left:-12px;
				vertical-align:baseline;
				height:10px;
				width:10px;
			}
			.the-word-search {
				display: inline-block;
				max-width: 140px;
				overflow: hidden;
				text-overflow: ellipsis;
				vertical-align: bottom;
				white-space: nowrap;
				color: #a5a5a5;
			}
			.buttons {
				width:110px;
				display:flex;
				justify-content: flex-end;
				flex-direction:row;
				padding-right:20px;
			}
			@media (max-width: 310px) {
   			.buttons {
      		display: none;
   			}
			}
			.header {
				margin-top:70px;
				top: 0;
				width:100%;
			}
			.header-inner-container {
				align-items:center;
				display:flex;
				#justify-content: space-between;
				flex-direction:row;
				max-width:975px;
				margin:auto;
				padding-bottom:90;
			}
			.profile-pic-container {
				height:200px;
				width:200px;
				text-align:center;
				margin-right:30px;
			}
			.header-text-container {

			}
			.follow-button {
				color: rgba(var(--i1d,38,38,38),1);

			}

			h1 {
				font-size: 28px;
				line-height: 32px;
				margin: -5px 0 -6px;
				display: block;
				overflow: hidden;
				text-overflow: hidden;
				white-space: nowrap;
				font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
				font-weight:300;
			}


		</style>
	</head>

	<body class="background">
		<nav class="top-nav">
			<div class="nav-inner-container">
				<div class="huntergram-logo-container">
					<img class="huntergram-logo" src="res/huntergram_logo.svg">
				</div>
				<div class="searchbox">
					<div class="search-inner-container">
						<span><img class="spyglass" src="res/spyglass.png"></span>
						<span class = "the-word-search">Search</span>
					</div>
				</div>
				<div class="buttons">
					<img fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="res/home.svg">
					<img style="margin-left: 22px;" fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="res/compass.svg">
					<img style="margin-left: 22px;" fill="#262626" height="22" viewBox="0 0 48 48" width="22" src="res/heart.svg">
				</div>
			</div>
		</nav >
		<div class="header">
			<div class="header-inner-container">
				<div class="profile-pic-container">
					<img src="profilepic.png" height=167; width=167;>
				</div>
				<div class="header-text-container">
					<h1>hunter</h1>
				</div>
			</div>
		</div>

	</body>
</html>
